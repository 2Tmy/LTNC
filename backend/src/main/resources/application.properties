# ── Application ──────────────────────────────────────────
spring.application.name=complaint-management
server.port=8080

# ── DataSource ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/db
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Disable Open Session In View to prevent lazy-load issues in REST APIs
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────
# Secret must be >= 32 bytes (256 bits) for HMAC-SHA256
jwt.secret=company-complaint-secret-key-must-be-at-least-256-bits-long
# Expiration in milliseconds: 86400000 = 24 hours
jwt.expiration=86400000

# ── SpringDoc / Swagger UI ────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── Test data seeding ─────────────────────────────────────
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
